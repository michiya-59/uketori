services:
  api:
    build:
      context: ./api
    ports:
      - "127.0.0.1:8080:8080"  # localhost のみ。外部から直接アクセスできないようにする
    env_file:
      - .env.production
    environment:
      - RAILS_ENV=production
      - PORT=8080
      - SOLID_QUEUE_IN_PUMA=true
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"